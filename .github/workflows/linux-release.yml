name: Linux Release

on:
  push:
    tags:
      - "v*"

permissions:
      contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
        shell: bash

      - name: Prepare build metadata (config.json)
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION_STRIPPED="${VERSION#v}"
          export VERSION_STRIPPED
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("config.json")
          meta = json.loads(path.read_text(encoding="utf-8"))
          meta["version"] = os.environ["VERSION_STRIPPED"]
          meta["github_repo"] = os.environ["REPO"]
          path.write_text(
              json.dumps(meta, separators=(",", ":"), ensure_ascii=False),
              encoding="utf-8",
          )
          PY

      - name: Build PyInstaller (main app + ota_updater)
        shell: bash
        run: |
          rm -rf dist build
          pyinstaller build.spec

      - name: Create OTA ZIP (exclude ota_updater)
        id: ota_zip
        shell: bash
        run: |
          VERSION_STRIPPED="${GITHUB_REF_NAME#v}"
          ZIP_NAME="NiziPOSConnector-linux-ota-${VERSION_STRIPPED}.zip"
          STAGING="${RUNNER_TEMP}/nizi_pos_connector_ota_staging"

          rm -rf "$STAGING"
          mkdir -p "$STAGING"

          cp -r dist/NiziPOSConnector/* "$STAGING"/

          export VERSION_STRIPPED ZIP_NAME STAGING

          python - <<'PY'
          import hashlib
          import json
          import os
          import zipfile
          from pathlib import Path

          staging = Path(os.environ["STAGING"])
          zip_name = os.environ["ZIP_NAME"]

          # Create ZIP with contents at the root.
          with zipfile.ZipFile(zip_name, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for p in staging.rglob("*"):
                  if p.is_dir():
                      continue
                  rel = p.relative_to(staging)
                  zf.write(p, rel.as_posix())

          data = Path(zip_name).read_bytes()
          sha = hashlib.sha256(data).hexdigest()

          manifest = {
              "version": os.environ["VERSION_STRIPPED"],
              "sha256": sha,
              "zip_asset_name": zip_name,
          }
          Path("manifest-linux.json").write_text(
              json.dumps(manifest, separators=(",", ":"), ensure_ascii=False),
              encoding="utf-8",
          )

          print(f"zipName={zip_name}")
          print(f"zipPath={Path(zip_name).resolve()}")
          print(f"sha256={sha}")
          PY

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            manifest-linux.json
            NiziPOSConnector-linux-ota-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}